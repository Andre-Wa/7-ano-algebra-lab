<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Quizzes de Matemática</title>
    <!-- Tailwind CSS para o sistema de Grid e Blur -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800 flex flex-col">

    <!-- HEADER SIMPLES -->
    <header class="bg-slate-900 text-white shadow-md px-6 py-5 flex items-center gap-3">
        <div class="bg-indigo-600 p-2 rounded-lg">
            <i data-lucide="calculator" class="w-5 h-5"></i>
        </div>
        <h1 class="text-xl font-bold tracking-tight">Estúdio de Matemática Interativa</h1>
    </header>

    <!-- CORPO PRINCIPAL -->
    <main class="flex-grow max-w-5xl w-full mx-auto px-6 py-12 flex flex-col justify-center">
        
        <div class="mb-10 text-center md:text-left">
            <h2 class="text-3xl font-extrabold text-slate-800">Escolha o seu módulo</h2>
        </div>

        <!-- GRADE: 1 Coluna (Mobile) / 2 Colunas (Desktop) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">

            <!-- ============================================== -->
            <!-- PAG 1: ÁREA DO PROFESSOR (EDITOR)              -->
            <!-- ============================================== -->
            <div id="pag1" class="flex flex-col gap-4">
                
                <!-- Título do Módulo -->
                <h3 class="text-xl font-bold text-slate-700 flex items-center gap-2">
                    <i data-lucide="edit-3" class="text-indigo-600"></i> Quiz sobre Álgebra
                </h3>
                
                <!-- Botão-Link com Imagem Desfocada -->
                <!-- Substitua 'index.html' pelo link desejado -->
                <a href="quiz.html" class="relative block w-full aspect-video rounded-2xl overflow-hidden group shadow-lg border border-slate-200 bg-slate-200">
                    
                    <!-- IMAGEM DE CAPTURA DE TELA -->
                    <!-- Substitua o link do 'src' pelo print da sua tela (ex: 'print-editor.jpg') -->
                    <img src="./img/quiz-screenshot.webp" 
                         alt="Captura de tela do Editor" 
                         class="absolute inset-0 w-full h-full object-cover blur-[4px] group-hover:blur-none transition-all duration-500">
                    
                    <!-- Overlay escuro e Botão Central -->
                    <div class="absolute inset-0 bg-slate-900/40 group-hover:bg-slate-900/20 transition-all duration-500 flex items-center justify-center">
                        <span class="bg-emerald-600  text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-xl transform group-hover:scale-105 transition-all">
                            Acessar Quiz <i data-lucide="play" class="w-5 h-5"></i>
                        </span>
                    </div>
                </a>
            </div>

            <div id="pag2" class="flex flex-col gap-4">
                
                <!-- Título do Módulo -->
                <h3 class="text-xl font-bold text-slate-700 flex items-center gap-2">
                    <i data-lucide="gamepad-2" class="text-indigo-600"></i> Laboratório
                </h3>
                
                <a href="lab.html" class="relative block w-full aspect-video rounded-2xl overflow-hidden group shadow-lg border border-slate-200 bg-slate-200">
                    
                    <img src="./img/lab-screenshot.webp" 
                         alt="Captura de tela do Laboratório" 
                         class="absolute inset-0 w-full h-full object-cover blur-[4px] group-hover:blur-none transition-all duration-500">
                    
                    <!-- Overlay escuro e Botão Central -->
                    <div class="absolute inset-0 bg-slate-900/40 group-hover:bg-slate-900/20 transition-all duration-500 flex items-center justify-center">
                        <span class="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-xl transform group-hover:scale-105 transition-all">
                            Entrar no Lab <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </span>
                    </div>
                </a>
            </div>

        </div>
    </main>

    <!-- Inicializar Ícones -->
    <script>
        window.onload = function() {
            lucide.createIcons();
        };
    </script>
</body>
</html>
